<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Async Weather Tracker</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>🌤 Async Weather Tracker</h1>

<div class="top-section">

<div class="search-box card">

<h3>Search City</h3>

<div class="input-group">
<input type="text" id="cityInput" placeholder="Enter city name">
<button id="searchBtn">Search</button>
</div>

<h4>Search History</h4>
<div id="history"></div>

</div>

<div class="weather-box card">

<h3>Weather Info</h3>

<p><b>City:</b> <span id="city">-</span></p>
<p><b>Temp:</b> <span id="temp">-</span></p>
<p><b>Weather:</b> <span id="weather">-</span></p>
<p><b>Humidity:</b> <span id="humidity">-</span></p>
<p><b>Wind:</b> <span id="wind">-</span></p>

</div>

</div>

<div class="console card">

<h3>Console – Event Loop</h3>
<div id="logs"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
